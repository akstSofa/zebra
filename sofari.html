<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>Таблица</title>
    <link rel="stylesheet" href="jgg.css">
    <script src="jade.js" defer></script>
</head>
<body>
    <input type="text" id="name" placeholder="name">
    <input type="text" id="job" placeholder="job">
    <input type="text" id="num" placeholder="number">
    <button type="submit" id="add">Add</button>
    <button id="clear">clear</button>
    <div id="errorBlock"></div>
    <table border="1" id="table">
        <thead>
            <tr>
                <th>name</th>
                <th>job</th>
                <th>number</th>
            </tr>
        </thead>
        <tbody id="table-d"></tbody>
    </table>
</body>
</html>
